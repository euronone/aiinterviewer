version: '3.9'

services:
  # ─── FastAPI Backend ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - hireai-net

  # ─── Celery Worker (Background Tasks) ────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireai-celery
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - backend
    networks:
      - hireai-net

  # ─── Redis ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hireai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - hireai-net

  # ─── Frontend (dev) ───────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: hireai-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY}
    networks:
      - hireai-net

volumes:
  redis-data:

networks:
  hireai-net:
    driver: bridge
